worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    limit_req_zone $binary_remote_addr zone=geoserver_ratelimit:10m rate=25r/s;
	
	proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=geoserver_cache:10m inactive=24h max_size=500m;
	
	upstream geoserver-backend {
		server ogs-geoserver:8080;
		keepalive 0;
	}
	
    server {
        listen 8080;
        server_name _;

		location /geoserver {
            proxy_http_version 1.0;
			proxy_set_header Connection close;
		
			proxy_next_upstream error timeout http_502 http_503 http_504;
			proxy_next_upstream_tries 3;
			proxy_next_upstream_timeout 30s;

			proxy_connect_timeout 10s;
			proxy_send_timeout 300s;
			proxy_read_timeout 300s;
		
			proxy_pass http://geoserver-backend/geoserver;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
		
		location /pgadmin {
			proxy_pass http://ogs-pgadmin:8080/pgadmin;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_redirect off;
		}
    }
}
