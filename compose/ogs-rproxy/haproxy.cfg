global
    log stdout format raw local0
    maxconn 2000

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 10s
    timeout client 300s
    timeout server 300s
    retries 3

frontend fe_main
    bind *:8080

    # Path-based routing
    acl path_geoserver path_beg /geoserver
    acl path_pgadmin   path_beg /pgadmin

    use_backend be_geoserver if path_geoserver
    use_backend be_pgadmin if path_pgadmin

# ------------------------
# GeoServer backend
# ------------------------
backend be_geoserver
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Health check: accepts any 2xx or 3xx
    option httpchk GET /geoserver/web/wicket/bookmarkable/org.geoserver.web.AboutGeoServerPage?8&filter=false&filter=false
    http-check expect rstatus ^[23]

    server geoserver ogs-geoserver:8080 check inter 5s fall 2 rise 2

# ------------------------
# pgAdmin backend
# ------------------------
backend be_pgadmin
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Health check: specific URL that always returns 200
    option httpchk GET /pgadmin/login?next=/pgadmin/
    http-check expect status 200

    server pgadmin ogs-pgadmin:8080 check inter 5s fall 2 rise 2
