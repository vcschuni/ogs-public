global
    log stdout format raw local0
    maxconn 2000
    tune.http.maxhdr 65536

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 10s
    timeout client 300s
    timeout server 300s
    retries 3

# ------------------------
# Frontend
# ------------------------
frontend fe_main
    bind *:8080

    # Rate limiting: max 25 requests per second per IP
    stick-table type ip size 1m expire 10s store http_req_rate(10s)
    acl rate_exceeded sc_http_req_rate(0) gt 25
    http-request deny if rate_exceeded

    # Path routing
    acl path_geoserver path_beg /geoserver
    acl path_pgadmin   path_beg /pgadmin

    use_backend be_geoserver if path_geoserver
    use_backend be_pgadmin if path_pgadmin

# ------------------------
# GeoServer backend
# ------------------------
backend be_geoserver
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Active health check
    option httpchk GET /geoserver/web
    http-check expect status 200

    # OpenShift ClusterIP Service
    server geoserver ogs-geoserver:8080 check inter 5s fall 2 rise 2

# ------------------------
# pgAdmin backend
# ------------------------
backend be_pgadmin
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Health check
    option httpchk GET /pgadmin
    http-check expect status 200

    server pgadmin ogs-pgadmin:8080 check inter 5s fall 2 rise 2
