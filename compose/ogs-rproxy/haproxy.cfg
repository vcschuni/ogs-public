global
    log stdout format raw local0
    maxconn 2000

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 10s
    timeout client 300s
    timeout server 300s
    retries 3

# ------------------------
# Frontend
# ------------------------
frontend fe_main
    bind *:8080

    # Path routing
    acl path_geoserver path_beg /geoserver
    acl path_pgadmin   path_beg /pgadmin

    use_backend be_geoserver if path_geoserver
    use_backend be_pgadmin if path_pgadmin

# ------------------------
# GeoServer backend
# ------------------------
backend be_geoserver
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Health check: accept 200 and redirect (302/301/303) as healthy
    option httpchk GET /geoserver/web
    http-check expect status 200 301 302 303

    server geoserver ogs-geoserver:8080 check inter 5s fall 2 rise 2

# ------------------------
# pgAdmin backend
# ------------------------
backend be_pgadmin
    mode http
    balance roundrobin
    option http-server-close
    option forwardfor

    # Health check: accept 200 and 308 redirects
    option httpchk GET /pgadmin
    http-check expect status 200 308

    server pgadmin ogs-pgadmin:8080 check inter 5s fall 2 rise 2
